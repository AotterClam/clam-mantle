name = "mantle-blog"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Stub OAuth verifier — accepts `Bearer dev-<userId>` tokens for local
# dev / testing. Production deploy MUST replace with the real
# @cloudflare/workers-oauth-provider verifier (see mantle-cloudflare
# README) and remove this var.
MANTLE_ALLOW_STUB_OAUTH = "1"

[[d1_databases]]
binding = "DB"
database_name = "mantle-blog-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV"
id = "kv-mantle-blog-local"

# Bundle YAML manifests as inline text strings — TS imports them via
# `?raw` query param, esbuild resolves to a string export at build time.
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true
