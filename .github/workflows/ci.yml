name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref. PR pushes that arrive in
# rapid succession only spend CI on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks that fail the PR quickly. Runs on every push + PR.
  lint:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dist (typecheck + emit) for spec / runtime / admin-ui / cloudflare
        # Vitest tests for cloudflare import runtime/admin UI via dist/,
        # so build before test. Spec + runtime tests use src/ directly.
        run: pnpm -r --filter '@aotter/mantle-spec' --filter '@aotter/mantle-runtime' --filter '@aotter/mantle-admin-ui' --filter '@aotter/mantle-cloudflare' build

      - name: Re-link bins now that dist/ exists
        # First `pnpm install` runs before SDK build, so spec's
        # `bin: ./dist/.../MantleCli.js` target doesn't exist and pnpm
        # silently skips bin linking (logs WARN: "Failed to create bin
        # ... ENOENT"). Re-running install (idempotent) after build
        # creates the symlink. Without this, `pnpm -C starters/publication
        # validate` fails with `sh: mantle: not found`.
        run: pnpm install --frozen-lockfile

      - name: Check package boundaries
        run: pnpm run check:boundaries

      - name: Typecheck workspace + starters
        run: |
          pnpm typecheck
          pnpm -C starters/publication typecheck
          pnpm -C starters/blank typecheck

      - name: Validate starter manifests (Loop 1 — `mantle validate`)
        # Runs the spec CLI against each starter so any v0.1 grammar
        # regression (DRAFT key creep, dangling Trigger.target, View
        # filter referencing unknown fields, etc.) breaks the build
        # before the tests do.
        run: |
          pnpm -C starters/publication validate
          pnpm -C starters/blank validate

      - name: Theme fork/reset round-trip (all slot kinds)
        # Locks the theme:fork ↔ theme:reset invariant: any consumer
        # following the SKILL.md recipe can fork at every layer and
        # revert cleanly. Single-slot smoke missed bugs in template
        # path casing, i18n source resolution, multi-fork merge, and
        # icons stub wiring; this exercises all six.
        working-directory: starters/publication
        run: |
          set -euo pipefail
          # Fork every supported slot kind.
          pnpm theme:fork tokens.ts
          pnpm theme:fork components/Header.tsx
          pnpm theme:fork components/Footer.tsx
          pnpm theme:fork templates/post.tsx
          pnpm theme:fork i18n/en.json
          pnpm theme:fork icons.ts
          # Every override file is on disk.
          test -f src/theme/tokens.ts
          test -f src/theme/components/Header.tsx
          test -f src/theme/components/Footer.tsx
          test -f src/theme/templates/post.tsx
          test -f src/theme/i18n/en.json
          test -f src/theme/icons.ts
          # Index has all six imports + entries (multi-fork merged blocks).
          grep -q 'tokens: ForkedTokens' src/theme/index.ts
          grep -q 'Header: HeaderOverride' src/theme/index.ts
          grep -q 'Footer: FooterOverride' src/theme/index.ts
          grep -q 'post: postOverride' src/theme/index.ts
          grep -q '"en": enOverride' src/theme/index.ts
          grep -q 'icons: customIcons' src/theme/index.ts
          pnpm typecheck
          # Reset each in turn — round-trip restores baseline.
          pnpm theme:reset tokens.ts
          pnpm theme:reset components/Header.tsx
          pnpm theme:reset components/Footer.tsx
          pnpm theme:reset templates/post.tsx
          pnpm theme:reset i18n/en.json
          pnpm theme:reset icons.ts
          test ! -f src/theme/tokens.ts
          test ! -d src/theme/components
          test ! -d src/theme/templates
          test ! -d src/theme/i18n
          test ! -f src/theme/icons.ts
          pnpm typecheck

      - run: pnpm test

  # Heavier integration smoke. Runs wrangler dev against the starter,
  # applies the fixture, exercises the public read + contact form +
  # MCP endpoints. Catches miniflare / wrangler integration bugs that
  # in-process Hono tests miss (this is how we found the
  # `wrangler d1 execute` persist-dir mismatch in commit 7).
  starter-smoke:
    name: Starter integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter '@aotter/mantle-spec' --filter '@aotter/mantle-runtime' --filter '@aotter/mantle-admin-ui' --filter '@aotter/mantle-cloudflare' build

      # The starter-smoke runs against the wrangler test profile
      # (`[env.test]` in wrangler.toml — port 8788, persist-to
      # `.wrangler-test`). Keeps test miniflare state separate from
      # `pnpm dev`'s default profile and seeds the staff(u-staff-1,
      # editor) row that mcp-smoke (Bearer dev-u-staff-1) requires —
      # the dev fixture deliberately omits it so the operator's
      # first OAuth login can run `ensureBootstrapOwner`.
      - name: Provision test profile .dev.vars.test
        working-directory: starters/publication
        run: cp .dev.vars.test.example .dev.vars.test

      - name: Start wrangler dev (test profile) in background
        working-directory: starters/publication
        run: |
          npx wrangler dev \
            --env=test \
            --persist-to=.wrangler-test \
            --local \
            --port 8788 > wrangler.log 2>&1 &
          echo "WRANGLER_PID=$!" >> $GITHUB_ENV

      - name: Wait for wrangler dev to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8788/; then
              echo "wrangler dev ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "wrangler dev never came up"
          cat starters/publication/wrangler.log
          exit 1

      - name: Apply test fixture
        working-directory: starters/publication
        run: pnpm exec tsx test/fixture/apply-test.ts

      - name: Smoke — public reads
        run: |
          set -euo pipefail
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/)" = "302"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/zh-TW)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en/posts/hello-world)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/zh-TW/posts/translates-by-slug)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en/posts)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en/pages/about)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/zh-TW/pages/contact)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en/llms.txt)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/llms.txt)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/en/posts/does-not-exist)" = "404"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8788/zz)" = "404"

      - name: Smoke — contact form
        run: |
          set -euo pipefail
          # Happy path: 200 + ok:true
          OK=$(curl -s -X POST http://localhost:8788/api/contact \
            -H 'content-type: application/json' \
            -d '{"name":"CI","email":"ci@example.com","message":"hi","turnstileToken":"tok-pass"}')
          grep -q '"ok":true' <<< "$OK"

          # CAPTCHA fail: 403 + AUTH_DENIED (handler in dev-stub mode
          # rejects the literal `"fail"` token).
          STATUS=$(curl -s -o /tmp/body -w '%{http_code}' -X POST http://localhost:8788/api/contact \
            -H 'content-type: application/json' \
            -d '{"name":"Bot","email":"b@example.com","message":"spam","turnstileToken":"fail"}')
          test "$STATUS" = "403"
          grep -q '"AUTH_DENIED"' /tmp/body

          # Contact page renders the Turnstile widget + form
          PAGE=$(curl -s http://localhost:8788/en/pages/contact)
          grep -q 'cf-turnstile' <<< "$PAGE"
          grep -q 'data-sitekey=' <<< "$PAGE"
          grep -q '<form class="contact-form"' <<< "$PAGE"

      - name: Smoke — MCP transport (auth guard)
        run: |
          set -euo pipefail
          # Missing bearer: 401 — verifies the OAuth verifier wires.
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8788/mcp)" = "401"

      - name: Smoke — View REST integration (10 cases, ADR-0012)
        # Static + param-driven Views, pagination, show clamp, hasMore
        # boundary, missing-required → 400, unknown View → 404,
        # unknown-query-key lenient ignore, envelope-shape regression,
        # reserved-name pagination plumbing. See
        # starters/publication/test/integration/view-rest-smoke.ts.
        working-directory: starters/publication
        env:
          WRANGLER_BASE_URL: http://localhost:8788
        run: pnpm view-smoke

      - name: Smoke — MCP integration (12 tool calls)
        # initialize → tools/list → tools/call for each of the 6 v0.1.0
        # tools, plus lifecycle hook firing on contact-messages create
        # and error paths (stale OCC, unknown collection). See
        # starters/publication/test/integration/mcp-smoke.ts for the script.
        working-directory: starters/publication
        env:
          WRANGLER_BASE_URL: http://localhost:8788
        run: pnpm mcp-smoke

      - name: Tail wrangler log on success (debugging aid)
        if: always()
        working-directory: starters/publication
        run: |
          echo '--- wrangler.log (last 50 lines) ---'
          tail -n 50 wrangler.log || true

      - name: Stop wrangler dev
        if: always()
        run: kill "${WRANGLER_PID}" || true
