name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref. PR pushes that arrive in
# rapid succession only spend CI on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks that fail the PR quickly. Runs on every push + PR.
  lint:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dist (typecheck + emit) for spec / runtime / cloudflare
        # Vitest tests for cloudflare import the runtime via dist/, so
        # build before test. Spec + runtime tests use src/ directly.
        run: pnpm -r --filter '@aotterclam/clam-cms-spec' --filter '@aotterclam/clam-cms-runtime' --filter '@aotterclam/clam-cms-cloudflare' build

      - name: Re-link bins now that dist/ exists
        # First `pnpm install` runs before SDK build, so spec's
        # `bin: ./dist/.../ClamCmsCli.js` target doesn't exist and pnpm
        # silently skips bin linking (logs WARN: "Failed to create bin
        # ... ENOENT"). Re-running install (idempotent) after build
        # creates the symlink. Without this, `pnpm -C starters/blog
        # validate` fails with `sh: clam-cms: not found`.
        run: pnpm install --frozen-lockfile

      - name: Check package boundaries
        run: pnpm run check:boundaries

      - name: Typecheck workspace (all packages including admin-ui / netlify stubs + starters/blog)
        run: |
          pnpm typecheck
          pnpm -C starters/blog typecheck

      - name: Validate starter manifests (Loop 1 — `clam-cms validate`)
        # Runs the spec CLI against starters/blog so any v0.1 grammar
        # regression (DRAFT key creep, dangling Trigger.target, View
        # filter referencing unknown fields, etc.) breaks the build
        # before the tests do.
        run: pnpm -C starters/blog validate

      - run: pnpm test

  # Heavier integration smoke. Runs wrangler dev against the starter,
  # applies the fixture, exercises the public read + contact form +
  # MCP endpoints. Catches miniflare / wrangler integration bugs that
  # in-process Hono tests miss (this is how we found the
  # `wrangler d1 execute` persist-dir mismatch in commit 7).
  starter-smoke:
    name: Starter integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter '@aotterclam/clam-cms-spec' --filter '@aotterclam/clam-cms-runtime' --filter '@aotterclam/clam-cms-cloudflare' build

      - name: Apply fixture
        working-directory: starters/blog
        run: pnpm fixture

      - name: Start wrangler dev in background
        working-directory: starters/blog
        run: |
          npx wrangler dev --local --port 8787 > wrangler.log 2>&1 &
          echo "WRANGLER_PID=$!" >> $GITHUB_ENV

      - name: Wait for wrangler dev to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8787/; then
              echo "wrangler dev ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "wrangler dev never came up"
          cat starters/blog/wrangler.log
          exit 1

      - name: Smoke — public reads
        run: |
          set -euo pipefail
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/)" = "302"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/zh-TW)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en/posts/hello-world)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/zh-TW/posts/translates-by-slug)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en/posts)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en/pages/about)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/zh-TW/pages/contact)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en/llms.txt)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/llms.txt)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/en/posts/does-not-exist)" = "404"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/zz)" = "404"

      - name: Smoke — contact form
        run: |
          set -euo pipefail
          # Happy path: 200 + ok:true
          OK=$(curl -s -X POST http://localhost:8787/api/contact \
            -H 'content-type: application/json' \
            -d '{"name":"CI","email":"ci@example.com","message":"hi","turnstileToken":"tok-pass"}')
          echo "$OK" | grep -q '"ok":true'

          # CAPTCHA fail: 403 + AUTH_DENIED (handler in dev-stub mode
          # rejects the literal `"fail"` token).
          STATUS=$(curl -s -o /tmp/body -w '%{http_code}' -X POST http://localhost:8787/api/contact \
            -H 'content-type: application/json' \
            -d '{"name":"Bot","email":"b@example.com","message":"spam","turnstileToken":"fail"}')
          test "$STATUS" = "403"
          grep -q '"AUTH_DENIED"' /tmp/body

          # Contact page renders the Turnstile widget + form
          PAGE=$(curl -s http://localhost:8787/en/pages/contact)
          echo "$PAGE" | grep -q 'cf-turnstile'
          echo "$PAGE" | grep -q 'data-sitekey='
          echo "$PAGE" | grep -q '<form class="contact-form"'

      - name: Smoke — MCP transport (auth guard)
        run: |
          set -euo pipefail
          # Missing bearer: 401 — verifies the OAuth verifier wires.
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8787/mcp)" = "401"

      - name: Smoke — View REST integration (10 cases, ADR-0012)
        # Static + param-driven Views, pagination, show clamp, hasMore
        # boundary, missing-required → 400, unknown View → 404,
        # unknown-query-key lenient ignore, envelope-shape regression,
        # reserved-name pagination plumbing. See
        # starters/blog/test/integration/view-rest-smoke.ts.
        working-directory: starters/blog
        run: pnpm view-smoke

      - name: Smoke — MCP integration (12 tool calls)
        # initialize → tools/list → tools/call for each of the 6 v0.1.0
        # tools, plus lifecycle hook firing on contact-messages create
        # and error paths (stale OCC, unknown collection). See
        # starters/blog/test/integration/mcp-smoke.ts for the script.
        working-directory: starters/blog
        run: pnpm mcp-smoke

      - name: Tail wrangler log on success (debugging aid)
        if: always()
        working-directory: starters/blog
        run: |
          echo '--- wrangler.log (last 50 lines) ---'
          tail -n 50 wrangler.log || true

      - name: Stop wrangler dev
        if: always()
        run: kill "${WRANGLER_PID}" || true
