name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref. PR pushes that arrive in
# rapid succession only spend CI on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks that fail the PR quickly. Runs on every push + PR.
  lint:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dist (typecheck + emit) for spec / runtime / admin-ui / cloudflare
        # Vitest tests for cloudflare import runtime/admin UI via dist/,
        # so build before test. Spec + runtime tests use src/ directly.
        run: pnpm -r --filter '@aotterclam/mantle-spec' --filter '@aotterclam/mantle-runtime' --filter '@aotterclam/mantle-admin-ui' --filter '@aotterclam/mantle-cloudflare' build

      - name: Re-link bins now that dist/ exists
        # First `pnpm install` runs before SDK build, so spec's
        # `bin: ./dist/.../ClamCmsCli.js` target doesn't exist and pnpm
        # silently skips bin linking (logs WARN: "Failed to create bin
        # ... ENOENT"). Re-running install (idempotent) after build
        # creates the symlink before starter validation.
        run: pnpm install --frozen-lockfile

      - name: Check package boundaries
        run: pnpm run check:boundaries

      - name: Typecheck workspace
        # Starter typecheck/validate moved out with PR #108 (blank
        # migrated to AotterClam/mantle-starters); run there now.
        run: pnpm typecheck

      - run: pnpm test
