# Release fanout — Step 1 of #191.
#
# Triggered by pushing a `v*` tag. Does:
#
#   1. Build + test (gate — bad tag never publishes)
#   2. Write the tag's version into every public package.json
#   3. `pnpm -r publish` with npm dist-tag inferred from the prerelease
#      suffix (see § "npm tag inference" below)
#   4. Create a GitHub release with auto-generated notes
#   5. Dispatch `aotter/mantle-starters` with the new SDK version
#      so its `bump-from-sdk.yml` workflow opens a downstream bump PR
#
# Steps 2-3 of the fanout (starters bump → tag → landing bump → deploy)
# live in the downstream repos' workflows; see the issue body for the
# whole chain.
#
# ── Operator setup (one-time, repo secrets) ───────────────────────────
#
#   NPM_TOKEN              — npm automation token with publish access to
#                            `@aotter/*`. Repo Settings → Secrets →
#                            Actions → New repository secret.
#
#   RELEASE_FANOUT_TOKEN   — fine-grained PAT (or GitHub App installation
#                            token) with `contents: write` +
#                            `pull-requests: write` on `mantle-starters`.
#                            Used for the `repository_dispatch` API call.
#                            GITHUB_TOKEN can't dispatch across repos, so
#                            this is required.
#
# Without these secrets, the workflow fails fast at the publish / dispatch
# step — the publish gate already gates on tests, so a missing token can't
# leak a partial release.
#
# ── npm tag inference ────────────────────────────────────────────────
#
#   v1.2.3            → latest
#   v0.0.11-alpha.4   → alpha
#   v0.0.11-beta.1    → beta
#   v0.0.11-rc.1      → rc
#
# The mapping is in the "Extract version + infer npm tag" step. Without
# it, every prerelease would land on `latest` and break adopters running
# `npm install @aotter/mantle` without a tag.

name: release

on:
  push:
    tags:
      - 'v*'

# Only one release run at a time per tag — if two tag pushes race
# somehow, the later one queues until the first finishes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub release
  id-token: write   # npm provenance (when we opt in later)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (release gate)
        run: pnpm build

      - name: Test (release gate)
        run: pnpm test

      - name: Extract version + infer npm tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-alpha*) NPM_TAG=alpha ;;
            *-beta*)  NPM_TAG=beta ;;
            *-rc*)    NPM_TAG=rc ;;
            *)        NPM_TAG=latest ;;
          esac
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG → version $VERSION → npm dist-tag $NPM_TAG"

      - name: Verify package versions match ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const expected = '${{ steps.ver.outputs.version }}';
            const paths = [
              'packages/mantle-spec/package.json',
              'packages/mantle-admin-ui/package.json',
              'packages/mantle-runtime/package.json',
              'packages/adapters/cloudflare/package.json',
              'packages/mantle/package.json',
            ];
            let failed = false;
            for (const path of paths) {
              const pkg = JSON.parse(readFileSync(path, 'utf8'));
              if (pkg.version !== expected) {
                console.error(path + ' version ' + pkg.version + ' does not match tag version ' + expected);
                failed = true;
              }
            }
            if (failed) process.exit(1);
          "

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          PUBLISH_TAG="${{ steps.ver.outputs.npm_tag }}"
          # Pre-v0.1 policy: npm latest follows the most user-useful
          # prerelease. Publishing with the primary tag set to latest
          # also keeps npmjs.com's package README metadata fresh.
          if [[ "$VERSION" == 0.0.* && "$PUBLISH_TAG" != "latest" ]]; then
            PUBLISH_TAG=latest
          fi
          mkdir -p .release-tarballs
          for dir in \
            packages/mantle-spec \
            packages/mantle-admin-ui \
            packages/mantle-runtime \
            packages/adapters/cloudflare \
            packages/mantle
          do
            pnpm -C "$dir" pack --pack-destination "$PWD/.release-tarballs"
          done

          for tgz in \
            ".release-tarballs/aotter-mantle-spec-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-admin-ui-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-runtime-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-cloudflare-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-$VERSION.tgz"
          do
            npm publish "$tgz" \
              --registry https://registry.npmjs.org \
              --tag "$PUBLISH_TAG" \
              --access public
          done

          if [[ "$PUBLISH_TAG" != "${{ steps.ver.outputs.npm_tag }}" ]]; then
            for p in \
              @aotter/mantle-spec \
              @aotter/mantle-admin-ui \
              @aotter/mantle-runtime \
              @aotter/mantle-cloudflare \
              @aotter/mantle
            do
              npm dist-tag add "$p@$VERSION" "${{ steps.ver.outputs.npm_tag }}" --registry https://registry.npmjs.org
            done
          fi

      - name: Verify npm metadata
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          PACKAGES='@aotter/mantle-spec @aotter/mantle-admin-ui @aotter/mantle-runtime @aotter/mantle-cloudflare @aotter/mantle'
          for attempt in 1 2 3 4 5 6 7 8; do
            READY=1
            for p in $PACKAGES; do
              npm view "$p@$VERSION" version readmeFilename --json --registry https://registry.npmjs.org || READY=0
            done
            README_LEN=$((npm view "@aotter/mantle@$VERSION" readme --json --registry https://registry.npmjs.org 2>/dev/null || true) | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const v=s.trim()?JSON.parse(s):''; console.log((v || '').length);})")
            if [ "$READY" = 1 ] && [ "$README_LEN" -ge 200 ]; then
              exit 0
            fi
            echo "npm metadata not ready yet (attempt $attempt, mantle readme length $README_LEN); retrying"
            sleep 15
          done
          echo "::error::npm metadata did not become ready or @aotter/mantle@$VERSION readme stayed empty"
          exit 1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Mark prereleases so GitHub UI / consumers can filter.
          PRERELEASE_FLAG=""
          if [[ "${{ steps.ver.outputs.npm_tag }}" != "latest" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            $PRERELEASE_FLAG

      - name: Dispatch starters bump-from-sdk
        env:
          GH_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::RELEASE_FANOUT_TOKEN not set — starters bump skipped. SDK is published; set the secret and re-dispatch via the Actions UI to continue the fanout."
            exit 0
          fi
          gh api "repos/${{ github.repository_owner }}/mantle-starters/dispatches" \
            -f event_type=sdk-published \
            -F "client_payload[sdk_version]=${{ steps.ver.outputs.version }}" \
            -F "client_payload[npm_tag]=${{ steps.ver.outputs.npm_tag }}"
          echo "Dispatched mantle-starters bump-from-sdk for ${{ steps.ver.outputs.version }}"
