name: Release create-mantle tarball

# Builds the @aotter/create-mantle package and uploads its
# `pnpm pack` tarball to the matching GitHub release. The release must
# already exist when the tag is pushed (created by the release PR flow
# in docs/release-process.md). This workflow attaches the install
# scaffolder asset so `npx https://github.com/.../releases/.../*.tgz`
# resolves — see skills/install/SKILL.md for how Mantle uses the URL.

on:
  push:
    tags:
      - "v*-alpha"
      - "v*-beta.*"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  upload-tarball:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build create-mantle
        run: pnpm --filter @aotter/create-mantle build

      - name: Pack tarball
        id: pack
        working-directory: packages/create-mantle
        run: |
          pnpm pack
          tarball=$(ls aotter-create-mantle-*.tgz | head -n 1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Packed: $tarball"

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "packages/create-mantle/${{ steps.pack.outputs.tarball }}" \
            --clobber
