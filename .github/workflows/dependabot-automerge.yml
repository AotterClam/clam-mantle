# Auto-merge dependabot PRs after CI passes — but only for patch /
# minor / digest update types. Major bumps stay manual because the
# breaking-change surface is too wide to merge unattended.
#
# Sequencing: dependabot opens its PR against `develop` (see
# `.github/dependabot.yml`); CI runs via `ci.yml`; once CI is green
# `gh pr merge --auto` queues the merge.
#
# Lockfile note: unlike mantle-starters, this repo's dependabot setup
# *does* regenerate `pnpm-lock.yaml` correctly (single root workspace
# vs starters' per-dir lockfiles), so no separate lockfile-fixup
# workflow is needed here.

name: dependabot-automerge

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Approve first — develop branch protection requires 1 approving
      # review (same shape as main). Dependabot can't self-approve, so
      # without this the auto-merge queue stays BLOCKED forever. Repo
      # Settings → Actions → "Allow GitHub Actions to create and approve
      # PRs" must be on (flipped 2026-05-17 at org level).
      - name: Auto-approve patch + minor + digest
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-digest'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Auto-merge patch + minor + digest
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-digest'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Rebase merge: keeps `develop` linear and preserves dependabot's
        # `chore(deps): bump X` subject as the head commit. Squash is
        # disabled on this repo; merge-commit is allowed but generates
        # noisy 'Merge pull request #N from ...' subjects we don't want.
        run: gh pr merge --auto --rebase "$PR_URL"
