name: mirror-github-packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version to mirror, for example 0.0.11-alpha.11'
        required: true
        type: string
      npm_tag:
        description: 'Dist-tag to apply on GitHub Packages'
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest

permissions:
  contents: read
  packages: write

concurrency:
  group: mirror-github-packages-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify package versions match input
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const expected = '${{ inputs.version }}';
            const paths = [
              'packages/mantle-spec/package.json',
              'packages/mantle-admin-ui/package.json',
              'packages/mantle-runtime/package.json',
              'packages/adapters/cloudflare/package.json',
              'packages/mantle/package.json',
            ];
            let failed = false;
            for (const path of paths) {
              const pkg = JSON.parse(readFileSync(path, 'utf8'));
              if (pkg.version !== expected) {
                console.error(path + ' version ' + pkg.version + ' does not match input version ' + expected);
                failed = true;
              }
            }
            if (failed) process.exit(1);
          "

      - name: Pack release tarballs
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          mkdir -p .release-tarballs
          for dir in \
            packages/mantle-spec \
            packages/mantle-admin-ui \
            packages/mantle-runtime \
            packages/adapters/cloudflare \
            packages/mantle
          do
            pnpm -C "$dir" pack --pack-destination "$PWD/.release-tarballs"
          done

          for tgz in \
            ".release-tarballs/aotter-mantle-spec-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-admin-ui-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-runtime-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-cloudflare-$VERSION.tgz" \
            ".release-tarballs/aotter-mantle-$VERSION.tgz"
          do
            test -f "$tgz"
          done

      - name: Publish missing packages to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          VERSION="${{ inputs.version }}"
          PUBLISH_TAG="${{ inputs.npm_tag }}"
          if [[ "$VERSION" == 0.0.* && "$PUBLISH_TAG" != "latest" ]]; then
            PUBLISH_TAG=latest
          fi
          mkdir -p .github-package-tarballs

          declare -a PACKAGES=(
            "@aotter/mantle-spec:.release-tarballs/aotter-mantle-spec-$VERSION.tgz"
            "@aotter/mantle-admin-ui:.release-tarballs/aotter-mantle-admin-ui-$VERSION.tgz"
            "@aotter/mantle-runtime:.release-tarballs/aotter-mantle-runtime-$VERSION.tgz"
            "@aotter/mantle-cloudflare:.release-tarballs/aotter-mantle-cloudflare-$VERSION.tgz"
            "@aotter/mantle:.release-tarballs/aotter-mantle-$VERSION.tgz"
          )

          for item in "${PACKAGES[@]}"; do
            pkg="${item%%:*}"
            tgz="${item#*:}"
            if npm view "$pkg@$VERSION" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
              echo "$pkg@$VERSION already exists on GitHub Packages; skipping publish"
            else
              work="$(mktemp -d)"
              tar -xzf "$tgz" -C "$work"
              node --input-type=module - "$work/package/package.json" <<'NODE'
                import { readFileSync, writeFileSync } from 'node:fs';
                const path = process.argv[2];
                const pkg = JSON.parse(readFileSync(path, 'utf8'));
                pkg.publishConfig = {
                  ...(pkg.publishConfig ?? {}),
                  registry: 'https://npm.pkg.github.com',
                };
                writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
NODE
              (
                cd "$work/package"
                npm pack --pack-destination "$GITHUB_WORKSPACE/.github-package-tarballs" >/dev/null
              )
              gpr_tgz="$GITHUB_WORKSPACE/.github-package-tarballs/$(basename "$tgz")"
              npm publish "$gpr_tgz" \
                --registry https://npm.pkg.github.com \
                --tag "$PUBLISH_TAG" \
                --access public
              rm -rf "$work"
            fi
          done

          if [[ "$PUBLISH_TAG" != "${{ inputs.npm_tag }}" ]]; then
            for p in \
              @aotter/mantle-spec \
              @aotter/mantle-admin-ui \
              @aotter/mantle-runtime \
              @aotter/mantle-cloudflare \
              @aotter/mantle
            do
              npm dist-tag add "$p@$VERSION" "${{ inputs.npm_tag }}" --registry https://npm.pkg.github.com
            done
          fi
