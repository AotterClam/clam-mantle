version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    labels:
      - dependencies
    groups:
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
          - "tsup"
          - "vitest"
          - "@vitest/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
          - "@vitejs/plugin-react"
      hono:
        patterns:
          - "hono"
          - "@hono/*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    labels:
      - area:ci
      - dependencies
