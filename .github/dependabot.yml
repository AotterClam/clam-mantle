version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    labels:
      - dependencies
    # Supply-chain buffer: dependabot skips releases newer than the
    # cooldown window, letting the npm community surface attacks /
    # serious regressions before our bots react. 14 days is the
    # default; majors get 21 days because the blast radius is bigger
    # and bad major releases tend to be discovered slower.
    #
    # We don't carve out per-package exceptions yet — every dep on
    # this list (hono, zod, better-auth, etc.) sees the same buffer.
    # If a critical CVE lands inside the cooldown window, the manual
    # path is `gh workflow run` of the dependabot rebase or a
    # one-off `pnpm up` PR; cooldown is for the steady-state churn,
    # not emergencies.
    cooldown:
      default-days: 14
      semver-major-days: 21
    groups:
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
          - "tsup"
          - "vitest"
          - "@vitest/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      admin-ui-vite:
        patterns:
          - "vite"
          - "vite-plugin-singlefile"
          - "@vitejs/plugin-react"
          - "@tailwindcss/vite"
      hono:
        patterns:
          - "hono"
          - "@hono/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
          - "miniflare"
      runtime-libs:
        patterns:
          - "better-auth"
          - "yaml"
          - "marked"
          - "zod"
          - "aws4fetch"
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    labels:
      - area:ci
      - dependencies
    # github-actions ecosystem does NOT accept `semver-major-days` —
    # GitHub's dependabot config validator rejects it. Only the
    # `default-days` key is supported here. The npm block above uses
    # the full pair (default + semver-major) since both keys are
    # supported there.
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns: ["*"]
